<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Manager — Hackability Admin</title>
  <link rel="stylesheet" href="admin.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230D1B8E'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%23F5C200' font-size='18' font-weight='bold'>H</text></svg>" />
  <!-- Quill Editor CSS -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    .blog-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2rem;
    }
    .blog-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-card);
      padding: 1rem 1.5rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      transition: border-color 0.2s;
    }
    .blog-item:hover {
      border-color: var(--accent-yellow);
    }
    .blog-info h4 {
      margin: 0 0 0.5rem 0;
      font-size: 1.1rem;
    }
    .blog-info p {
      margin: 0;
      color: #888;
      font-size: 0.9rem;
    }
    .blog-actions {
      display: flex;
      gap: 0.5rem;
    }
    .ql-toolbar {
      background: #f8f9fa;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
    }
    .ql-container {
      background: var(--bg-card);
      color: var(--text-color);
      min-height: 300px;
      font-family: 'Inter', sans-serif;
      border-bottom-left-radius: 6px;
      border-bottom-right-radius: 6px;
    }
    .image-preview-wrapper {
      margin-top: 1rem;
      max-width: 300px;
      border-radius: 8px;
      overflow: hidden;
      display: none;
    }
    .image-preview-wrapper img {
      width: 100%;
      display: block;
    }
    .hidden { display: none !important; }
    .view-container {
      animation: fadeIn 0.3s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .btn-danger {
      background: #dc3545;
      color: white;
      border-color: #dc3545;
    }
    .btn-danger:hover {
      background: #c82333;
    }
  </style>
</head>
<body>

  <!-- Mobile sidebar toggle -->
  <button class="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
  <div class="sidebar-overlay"></div>

  <div class="admin-layout">
    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo-icon">H</div>
        <h2>Hack<span>ability</span></h2>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Content</div>
        <a href="dashboard.html">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="partners.html">
          <span class="nav-icon">🤝</span> Partners
        </a>
        <a href="blog.html" class="active">
          <span class="nav-icon">✍️</span> Blog
        </a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn btn-ghost btn-block btn-logout">
          🚪 Logout
        </button>
      </div>
    </aside>

    <!-- ========== MAIN AREA ========== -->
    <div class="main-area">
      <!-- Header -->
      <header class="header">
        <span class="header-title">Blog Manager</span>
        <div class="header-user">
          <span id="user-email"></span>
        </div>
      </header>

      <!-- Content -->
      <div class="content" id="view-list">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h2 class="section-title" style="margin-bottom: 0;">All Blogs</h2>
          <button class="btn btn-primary" onclick="showForm()">+ Create New Blog</button>
        </div>

        <div id="blog-list" class="blog-list">
          <p>Loading blogs...</p>
        </div>
      </div>

      <!-- Form View -->
      <div class="content hidden" id="view-form">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
          <h2 class="section-title" id="form-title" style="margin-bottom: 0;">Create Blog</h2>
          <button class="btn btn-ghost" onclick="showList()">← Back to List</button>
        </div>

        <div class="accordion animate-reveal">
          <div class="accordion-header">
            <h3><span class="section-icon">📝</span> Content Details</h3>
          </div>
          <div class="accordion-body">
            <input type="hidden" id="blog-id" />
            <div class="form-group">
              <label>Title</label>
              <input type="text" id="blog-title" placeholder="Blog Post Title" oninput="generateSlug()" />
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label>Slug (URL Friendly)</label>
                <input type="text" id="blog-slug" placeholder="blog-post-title" />
              </div>
              <div class="form-group">
                <label>Author</label>
                <input type="text" id="blog-author" placeholder="Author Name" />
              </div>
            </div>

            <div class="form-group">
              <label>Publish Date</label>
              <input type="date" id="blog-date" />
            </div>

            <div class="form-group">
              <label>Featured Image</label>
              <input type="file" id="blog-image" accept="image/*" />
              <input type="hidden" id="blog-image-url" />
              <div id="image-preview" class="image-preview-wrapper">
                <img id="preview-img" src="" alt="Featured Image" />
              </div>
            </div>

            <div class="form-group">
              <label>Excerpt / Short Description</label>
              <textarea id="blog-excerpt" rows="3" placeholder="Brief summary for the blog card..."></textarea>
            </div>

            <div class="form-group">
              <label>Content</label>
              <div id="editor"></div>
            </div>
          </div>
        </div>

        <!-- SEO Section -->
        <div class="accordion animate-reveal">
          <div class="accordion-header">
            <h3><span class="section-icon">🔍</span> SEO Optimization</h3>
          </div>
          <div class="accordion-body">
            <div class="form-group">
              <label>Meta Title</label>
              <input type="text" id="seo-title" placeholder="SEO Title (usually 50-60 characters)" />
            </div>
            <div class="form-group">
              <label>Meta Description</label>
              <textarea id="seo-description" rows="3" placeholder="SEO Description (usually 150-160 characters)"></textarea>
            </div>
            <div class="form-group">
              <label>Keywords (comma separated)</label>
              <input type="text" id="seo-keywords" placeholder="startup, innovation, community" />
            </div>
          </div>
        </div>

        <div class="section-save-row" style="margin-top:2rem;">
          <button class="btn btn-primary" onclick="saveBlog()" id="btn-save" style="width: 200px;">Save Blog</button>
        </div>

      </div><!-- /form content -->
    </div><!-- /main-area -->
  </div><!-- /admin-layout -->

  <!-- Notification Toast -->
  <div id="toast" class="toast"></div>

  <!-- Firebase Compat CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <!-- Quill Editor -->
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

  <!-- Blog Logic -->
  <script src="blog-admin.js"></script>

</body>
</html>
