<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Hackability Admin</title>
  <link rel="stylesheet" href="admin.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230D1B8E'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%23F5C200' font-size='18' font-weight='bold'>H</text></svg>" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <h1>Hack<span>ability</span></h1>
        <p>Admin Dashboard — Sign in to continue</p>
      </div>

      <div id="login-error" class="login-error"></div>

      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="admin@hackability.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button id="login-btn" class="btn btn-yellow btn-block" style="margin-top:.5rem;padding:.75rem">
        Sign In
      </button>
    </div>
  </div>

  <!-- Firebase Compat CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="admin.js"></script>

</body>
</html>
